name: Integration Tests

# Runs against live remote datasets (EODC object storage).
# Kept separate from main CI to avoid flaky failures from transient network issues.
# Trigger manually or let the weekly schedule catch regressions.

on:
  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Test filter (pytest -k pattern)'
        required: false
        default: ''
        type: string
      verbose:
        description: 'Verbose output (-v -s)'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC

jobs:
  integration-tests-linux:
    name: Integration Tests - Linux
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install GDAL and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository ppa:ubuntugis/ubuntugis-unstable -y
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev python3-gdal cmake build-essential ninja-build

      - name: Install Python packages
        run: |
          python3 -m pip install pytest pytest-xdist numpy rasterio rioxarray

      - name: Build EOPFZARR driver
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Run integration tests
        env:
          GDAL_DRIVER_PATH: ${{ github.workspace }}/build
          GDAL_HTTP_MAX_RETRY: '5'
          GDAL_HTTP_RETRY_DELAY: '3'
        run: |
          EXTRA_FLAGS="-v"
          if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
            EXTRA_FLAGS="-v -s"
          fi
          FILTER="${{ github.event.inputs.test_filter }}"
          if [ -n "$FILTER" ]; then
            python3 -m pytest -c pytest.ini tests/integration/ $EXTRA_FLAGS --tb=short -k "$FILTER"
          else
            python3 -m pytest -c pytest.ini tests/integration/ $EXTRA_FLAGS --tb=short
          fi

  integration-tests-macos:
    name: Integration Tests - macOS
    runs-on: macos-13

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install GDAL and dependencies
        run: brew install gdal cmake ninja

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python packages
        run: python -m pip install pytest pytest-xdist numpy rasterio rioxarray

      - name: Install GDAL Python bindings
        run: |
          GDAL_VERSION=$(gdal-config --version)
          pip install "gdal==${GDAL_VERSION}" || pip install "gdal>=${GDAL_VERSION%.*},<$(echo $GDAL_VERSION | awk -F. '{print $1"."$2+1}')" || true
          python -c "from osgeo import gdal; print(f'GDAL Python bindings: {gdal.VersionInfo()}')"

      - name: Build EOPFZARR driver
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Run integration tests
        env:
          GDAL_DRIVER_PATH: ${{ github.workspace }}/build
          GDAL_DATA: /opt/homebrew/share/gdal
          PROJ_LIB: /opt/homebrew/share/proj
          GDAL_HTTP_MAX_RETRY: '5'
          GDAL_HTTP_RETRY_DELAY: '3'
        run: |
          RASTERIO_SITE=$(python -c "import site; print(site.getsitepackages()[0])")
          RASTERIO_DYLIBS="$RASTERIO_SITE/rasterio/.dylibs"
          if [ -d "$RASTERIO_DYLIBS" ]; then
            export DYLD_LIBRARY_PATH="$RASTERIO_DYLIBS:$(brew --prefix)/lib:$DYLD_LIBRARY_PATH"
          else
            export DYLD_LIBRARY_PATH="$(brew --prefix)/lib:$DYLD_LIBRARY_PATH"
          fi
          EXTRA_FLAGS="-v"
          if [ "${{ github.event.inputs.verbose }}" = "true" ]; then
            EXTRA_FLAGS="-v -s"
          fi
          FILTER="${{ github.event.inputs.test_filter }}"
          if [ -n "$FILTER" ]; then
            python -m pytest -c pytest.ini tests/integration/ $EXTRA_FLAGS --tb=short -k "$FILTER"
          else
            python -m pytest -c pytest.ini tests/integration/ $EXTRA_FLAGS --tb=short
          fi

  integration-tests-windows:
    name: Integration Tests - Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GDAL with OSGeo4W
        uses: echoix/setup-OSGeo4W@v0.2.0
        with:
          packages: gdal-devel cmake ninja python3-core python3-pip python3-gdal python3-numpy python3-pytest
          root: C:\OSGeo4W

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build EOPFZARR driver
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_PREFIX_PATH="C:/OSGeo4W;C:/OSGeo4W/apps/gdal" -DGDAL_DIR="C:/OSGeo4W/apps/gdal/lib/cmake/gdal"
          cmake --build build --config Release --parallel

      - name: Install Python packages
        run: |
          C:\OSGeo4W\apps\Python312\python3.exe -m pip install "numpy<2.0" pytest pytest-xdist rasterio rioxarray

      - name: Run integration tests
        shell: pwsh
        env:
          GDAL_HTTP_MAX_RETRY: '5'
          GDAL_HTTP_RETRY_DELAY: '3'
        run: |
          $env:GDAL_DRIVER_PATH = "$PWD\build\Release"
          $env:GDAL_DATA = "C:\OSGeo4W\share\gdal"
          $env:PROJ_LIB = "C:\OSGeo4W\share\proj"
          $env:PATH = "C:\OSGeo4W\bin;C:\OSGeo4W\apps\Python312;C:\OSGeo4W\apps\Python312\Scripts;" + $env:PATH
          $env:PYTHONPATH = "C:\OSGeo4W\apps\Python312\Lib\site-packages"
          $pythonExe = "C:\OSGeo4W\apps\Python312\python3.exe"

          $extraFlags = "-v"
          if ("${{ github.event.inputs.verbose }}" -eq "true") { $extraFlags = "-v -s" }
          $filter = "${{ github.event.inputs.test_filter }}"
          if ($filter) {
            & $pythonExe -m pytest -c pytest.ini tests/integration/ $extraFlags --tb=short -k "$filter"
          } else {
            & $pythonExe -m pytest -c pytest.ini tests/integration/ $extraFlags --tb=short
          }
